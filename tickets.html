<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Билеты</title>
    <link rel="stylesheet" href="stylesheets/style.css">
    <script src="javascripts/scripts.js" defer></script>
    <link rel="icon" href="images/iconN.svg">
</head>
<body>

    <div class="backgroundCircles">
        <div class="backgroundCircle backgroundCircle1"></div>
        <div class="backgroundCircle backgroundCircle2"></div>
        <div class="backgroundCircle backgroundCircle3"></div>
    </div>

    <div id="burger"></div>

    <nav class="mainMenu">
      <a class="mainMenuLink" href="affiche.html">Афиша</a>
      <a class="mainMenuLink active" href="tickets.html">Билеты</a>
      <a class="mainMenuLink" href="guestbook.html">Гостевая книга</a>
      <a href="index.html"><img src="images/kirwood.svg" alt=""></a>
      <a class="mainMenuLink" href="circus.html">Цирк</a>
      <a class="mainMenuLink" href="children.html">Для детей</a>
      <a class="mainMenuLink" href="souvenirs.html">Сувениры</a>
    </nav>

    <main class="ticketsPage">
        <div class="ticketsImageBlock">
            <img class="ticketsSurok" src="images/ticketsSurok.svg" alt="">
        </div>

        <div class="ticketsFormBlock">

            <div class="ticketsHeading">
                <div class="ticketsTitle h2">Купить билет</div>
                <div class="ticketsSubtitle h4">заполните данные</div>
            </div>
            
            <form class="ticketsForm" action="404.html">
                <input type="text" name="name" placeholder="Имя">
                <input type="tel" name="phone" placeholder="Номер телефона">
                <input type="email" name="email" placeholder="Электронная почта">
                <select name="show" required>
                    <option value="" disabled selected>Шоу</option>
                    <option value="bugs">Жуки</option>
                    <option value="mink">В норке</option>
                    <option value="slay">Слэй</option>
                </select>
                <button type="submit">Отправить</button>
            </form>

        </div>
    </main>
    
    <footer>
        <img class="footerLogo" src="images/kirwoodWhite.svg" alt="Кирвуд">
        <div class="footerText h4">
            <div>Автор: Асанова Дарья</div>
            <div>Кураторы: Рихтер Камила, Комкова Анна</div>
        </div>
    </footer>

</body>
</html>
